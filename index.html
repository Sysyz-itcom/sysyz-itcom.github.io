<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title>邵阳市第一中学信息技术同好会</title>
	<script>
		// 检测是否为 IE 浏览器
    function detectIE() {
        var ua = window.navigator.userAgent;

        // 判断是否为 IE 浏览器的各个版本
        var isIE = ua.indexOf('MSIE ') > -1 || ua.indexOf('Trident/') > -1;

        return isIE;
    }

    // 页面加载时执行跳转逻辑
    window.onload = function() {
        if (detectIE()) {
            // 如果是 IE 浏览器，则跳转
            window.location.href = 'https://sysyz-itcom.github.io/firewall/000300.html';
        } else {
            // 如果不是 IE 浏览器，则跳转
            window.location.href = 'https://sysyz-itcom.github.io/itcom'; 
        }
    };
	</script>
	<script>
		document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
    });
	</script>
</head>

<body>
	<p>HTTP 302</p>
</body>

</html>
