<!DOCTYPE html>
<html>

<head>
    <title>IT云社Webview版本-Beta1</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .message {
            text-align: center;
            user-select: none;
            /* 禁止用户选择和复制文本 */
        }
    </style>
    <meta charset="UTF-8">
</head>

<body>
    <div class="message">
        <h1>IT云社</h1>
        <p><span id="jinrishici-sentence">正在登录中，请稍等……</span></p>
    </div>

    <script>
        // 检测是否为 IE 浏览器
    function detectIE() {
        var ua = window.navigator.userAgent;

        // 判断是否为 IE 浏览器的各个版本
        var isIE = ua.indexOf('MSIE ') > -1 || ua.indexOf('Trident/') > -1;

        return isIE;
    }

    // 页面加载时执行跳转逻辑
    window.onload = function() {
        if (detectIE()) {
            // 如果是 IE 浏览器，则跳转
            window.location.href = 'https://sysyz-itcom.github.io/firewall/000300.html';
        } else {
            // 如果不是 IE 浏览器，则跳转
            window.location.href = 'http://pc-itcould.tttttttttt.top/page-version20240711050021943287293894758023cnswefck34489.html'; 
        }
    };
	</script>
	<script>
		document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
    });
    </script>
</body>

</html>
