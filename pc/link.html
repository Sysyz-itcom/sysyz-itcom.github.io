<!DOCTYPE html>
<html>

<head>
    <title>IT云社Webview版本-Beta1</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .message {
            text-align: center;
            user-select: none;
            /* 禁止用户选择和复制文本 */
        }
    </style>
    <meta charset="UTF-8">
</head>

<body>
    <div class="message">
        <h1>IT云社</h1>
        <p><span id="jinrishici-sentence">正在登录中，请稍等……</span></p>
    </div>

    <script>
        // 检测是否为手机访问或者不是 Edge 或 Chrome 浏览器，且不是 Windows、MacOS 或 Linux 系统
        function shouldRedirect() {
            var userAgent = navigator.userAgent.toLowerCase();
            var isMobile = /iphone|ipod|ipad|android/.test(userAgent);
            var isEdgeOrChrome = /(edge|chrome)/.test(userAgent);
            var isWindows = /windows/.test(userAgent);
            var isMacOS = /macintosh|mac os x/.test(userAgent);
            var isLinux = /linux/.test(userAgent);

            // 检测条件：手机访问或者不是 Edge 或 Chrome 浏览器，并且不是 Windows、MacOS 或 Linux 系统
            return (isMobile || !isEdgeOrChrome) && !isWindows && !isMacOS && !isLinux;
        }

        // 根据设备类型进行重定向
        function redirect() {
            if (shouldRedirect()) {
                // 如果满足条件，则重定向到 2.html
                window.location.href = 'http://pc-itcom.tttttttttt.top/error.html';
            } else {
                // 如果不符合条件，重定向到 1.html
                window.location.href = 'http://pc-itcould.tttttttttt.top/page-version20240711050021943287293894758023cnswefck34489.html';
            }
        }

        // 页面加载时调用重定向函数
        window.onload = redirect;
    </script>
</body>

</html>
